<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0f1117" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="掃描帳單" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <title>帳單掃描器</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1117;
      --bg2: #181c27;
      --bg3: #1e2335;
      --card: #1a1f30;
      --border: rgba(255,255,255,0.08);
      --border2: rgba(255,255,255,0.14);
      --accent: #1a6cf6;
      --accent2: #3d87ff;
      --accent-glow: rgba(26,108,246,0.25);
      --text: #f0f2f8;
      --text2: #8b93a8;
      --text3: #555f75;
      --mono: 'DM Mono', monospace;
      --sans: 'DM Sans', sans-serif;
      --success: #22c97a;
      --danger: #ff5c5c;
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }

    body {
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ── */
    .app-header {
      padding: calc(var(--safe-top) + 16px) 20px 16px;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 10px;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .app-header .logo {
      width: 32px; height: 32px;
      background: var(--accent);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
    }
    .app-header .logo svg { width: 18px; height: 18px; }
    .app-header h1 { font-size: 17px; font-weight: 600; color: var(--text); }
    .app-header .sub { font-size: 12px; color: var(--text2); margin-top: 1px; }

    /* ── API Key setup ── */
    .setup-screen {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px 24px;
      gap: 20px;
    }
    .setup-icon {
      width: 64px; height: 64px;
      background: var(--bg3);
      border: 1px solid var(--border2);
      border-radius: 16px;
      display: flex; align-items: center; justify-content: center;
      font-size: 28px;
    }
    .setup-screen h2 { font-size: 20px; font-weight: 600; text-align: center; }
    .setup-screen p { font-size: 14px; color: var(--text2); text-align: center; line-height: 1.6; }
    .input-group { width: 100%; }
    .input-group label { font-size: 13px; color: var(--text2); display: block; margin-bottom: 8px; }
    .input-group input {
      width: 100%; background: var(--bg3); border: 1px solid var(--border2);
      border-radius: 10px; padding: 12px 14px; color: var(--text);
      font-size: 14px; font-family: var(--mono); outline: none;
      transition: border-color 0.15s;
    }
    .input-group input:focus { border-color: var(--accent); }
    .input-group input::placeholder { color: var(--text3); }
    .hint { font-size: 12px; color: var(--text3); text-align: center; line-height: 1.6; }
    .hint a { color: var(--accent2); text-decoration: none; }

    /* ── Main content ── */
    .main-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 20px 20px calc(var(--safe-bottom) + 20px);
      gap: 16px;
    }

    /* ── Upload zone ── */
    .upload-zone {
      border: 2px dashed var(--border2);
      border-radius: 16px;
      padding: 36px 20px;
      text-align: center;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: border-color 0.2s, background 0.2s;
      background: var(--bg2);
    }
    .upload-zone:hover, .upload-zone.drag-over {
      border-color: var(--accent);
      background: rgba(26,108,246,0.06);
    }
    .upload-zone input {
      position: absolute; inset: 0; opacity: 0;
      cursor: pointer; font-size: 100px; width: 100%; height: 100%;
    }
    .upload-zone .icon-wrap {
      width: 56px; height: 56px;
      background: var(--bg3);
      border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 14px;
      border: 1px solid var(--border2);
    }
    .upload-zone .icon-wrap svg { width: 28px; height: 28px; stroke: var(--accent2); }
    .upload-zone .label { font-size: 16px; font-weight: 500; color: var(--text); }
    .upload-zone .sub { font-size: 13px; color: var(--text2); margin-top: 6px; }
    .upload-zone .types {
      display: flex; gap: 8px; justify-content: center; margin-top: 14px; flex-wrap: wrap;
    }
    .upload-zone .types span {
      font-size: 11px; padding: 3px 10px;
      background: var(--bg3); border: 1px solid var(--border);
      border-radius: 20px; color: var(--text2);
    }

    /* ── Preview ── */
    .preview-card {
      border-radius: 16px; overflow: hidden;
      border: 1px solid var(--border2);
      position: relative;
    }
    .preview-card img {
      width: 100%; display: block;
      max-height: 260px; object-fit: cover;
    }
    .preview-card .overlay {
      position: absolute; inset: 0;
      background: linear-gradient(to bottom, rgba(0,0,0,0) 50%, rgba(0,0,0,0.6) 100%);
      display: flex; align-items: flex-end; padding: 12px;
    }
    .preview-card .retake-btn {
      background: rgba(255,255,255,0.12); backdrop-filter: blur(8px);
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 8px; padding: 7px 14px;
      color: white; font-size: 13px; cursor: pointer;
      display: flex; align-items: center; gap: 5px;
      font-family: var(--sans);
    }

    /* ── Scan button ── */
    .scan-btn {
      width: 100%; padding: 15px;
      background: var(--accent);
      border: none; border-radius: 14px;
      color: white; font-size: 16px; font-weight: 600;
      cursor: pointer; font-family: var(--sans);
      display: flex; align-items: center; justify-content: center; gap: 8px;
      transition: opacity 0.15s, transform 0.1s;
      letter-spacing: 0.02em;
    }
    .scan-btn:active { transform: scale(0.98); opacity: 0.9; }
    .scan-btn:disabled { opacity: 0.35; cursor: not-allowed; }
    .scan-btn svg { width: 20px; height: 20px; }

    /* ── Loading ── */
    .loading-state {
      text-align: center; padding: 32px 0;
      display: flex; flex-direction: column; align-items: center; gap: 16px;
    }
    .loading-ring {
      width: 44px; height: 44px;
      border: 3px solid var(--border2);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-state p { font-size: 14px; color: var(--text2); }
    .loading-state .dots::after {
      content: '';
      animation: dots 1.2s steps(4, end) infinite;
    }
    @keyframes dots { 0%,20%{content:''}40%{content:'.'}60%{content:'..'}80%,100%{content:'...'} }

    /* ── Result ── */
    .result-section { display: flex; flex-direction: column; gap: 12px; }
    .result-header {
      display: flex; align-items: center; gap: 8px;
      font-size: 13px; color: var(--success); font-weight: 500;
    }
    .result-header svg { width: 16px; height: 16px; }

    .number-card {
      background: var(--card);
      border: 1px solid var(--border2);
      border-radius: 14px;
      overflow: hidden;
    }
    .number-card .card-head {
      padding: 10px 14px 8px;
      font-size: 11px; color: var(--text2);
      text-transform: uppercase; letter-spacing: 0.08em;
      border-bottom: 1px solid var(--border);
    }
    .number-card .card-body {
      padding: 14px;
      display: flex; align-items: center; gap: 10px;
    }
    .number-display {
      flex: 1;
      font-family: var(--mono); font-size: 18px; font-weight: 500;
      color: var(--text);
      letter-spacing: 0.05em;
      word-break: break-all; line-height: 1.5;
    }
    .copy-btn {
      flex-shrink: 0;
      width: 40px; height: 40px;
      background: var(--bg3); border: 1px solid var(--border2);
      border-radius: 10px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.15s, border-color 0.15s;
      color: var(--text2);
    }
    .copy-btn:hover { background: var(--accent); border-color: var(--accent); color: white; }
    .copy-btn.copied { background: rgba(34,201,122,0.15); border-color: var(--success); color: var(--success); }
    .copy-btn svg { width: 18px; height: 18px; }

    .full-string-card {
      background: linear-gradient(135deg, rgba(26,108,246,0.12), rgba(61,135,255,0.06));
      border: 1px solid rgba(26,108,246,0.3);
      border-radius: 14px; overflow: hidden;
    }
    .full-string-card .card-head {
      padding: 10px 14px 8px;
      font-size: 11px; color: var(--accent2);
      text-transform: uppercase; letter-spacing: 0.08em;
      border-bottom: 1px solid rgba(26,108,246,0.2);
    }
    .full-string-card .card-body {
      padding: 14px;
      display: flex; align-items: center; gap: 10px;
    }
    .note-box {
      background: var(--bg3); border-radius: 10px;
      padding: 10px 13px; font-size: 12px;
      color: var(--text2); line-height: 1.6;
      border: 1px solid var(--border);
    }

    /* ── Error ── */
    .error-box {
      background: rgba(255,92,92,0.08);
      border: 1px solid rgba(255,92,92,0.25);
      border-radius: 12px; padding: 14px;
      display: flex; gap: 10px; align-items: flex-start;
      font-size: 14px; color: #ff8080; line-height: 1.5;
    }
    .error-box svg { width: 18px; height: 18px; flex-shrink: 0; margin-top: 1px; }

    /* ── Primary button (setup) ── */
    .primary-btn {
      width: 100%; padding: 14px;
      background: var(--accent); border: none; border-radius: 12px;
      color: white; font-size: 15px; font-weight: 600;
      cursor: pointer; font-family: var(--sans);
      transition: opacity 0.15s;
    }
    .primary-btn:active { opacity: 0.85; }

    /* ── Settings toggle ── */
    .settings-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 2px;
    }
    .settings-link {
      font-size: 12px; color: var(--text3); cursor: pointer;
      display: flex; align-items: center; gap: 4px;
      border: none; background: none; font-family: var(--sans);
    }
    .settings-link svg { width: 14px; height: 14px; }
    .settings-link:hover { color: var(--text2); }

    /* ── Install banner ── */
    .install-banner {
      background: rgba(26,108,246,0.1);
      border: 1px solid rgba(26,108,246,0.25);
      border-radius: 12px; padding: 12px 14px;
      display: flex; align-items: center; gap: 12px;
      font-size: 13px;
    }
    .install-banner .info { flex: 1; }
    .install-banner .info strong { color: var(--text); display: block; font-size: 13px; }
    .install-banner .info span { color: var(--text2); font-size: 12px; }
    .install-banner button {
      flex-shrink: 0; padding: 7px 14px;
      background: var(--accent); border: none; border-radius: 8px;
      color: white; font-size: 13px; font-weight: 500;
      cursor: pointer; font-family: var(--sans);
    }

    .hidden { display: none !important; }
  </style>
</head>
<body>

<!-- Header -->
<header class="app-header">
  <div class="logo">
    <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/>
      <polyline points="10 17 15 12 10 7"/>
      <line x1="15" y1="12" x2="3" y2="12"/>
    </svg>
  </div>
  <div>
    <h1>帳單掃描器</h1>
    <div class="sub">AI 辨識轉帳數字</div>
  </div>
</header>

<!-- API Key Setup Screen -->
<div id="setup-screen" class="setup-screen hidden">
  <div class="setup-icon">🔑</div>
  <h2>設定 API 金鑰</h2>
  <p>輸入你的 Google Gemini API Key 才能使用 AI 辨識功能。金鑰只會儲存在你的裝置上，不會上傳到任何伺服器。</p>
  <div class="input-group">
    <label>Google Gemini API Key（免費）</label>
    <input type="password" id="api-key-input" placeholder="AIza..." autocomplete="off" />
  </div>
  <button class="primary-btn" id="save-key-btn">儲存並開始使用</button>
  <p class="hint">
    還沒有 API Key？完全免費，不需信用卡<br/>
    前往 <a href="https://aistudio.google.com/apikey" target="_blank">Google AI Studio</a> 取得
  </p>
</div>

<!-- Main App Screen -->
<div id="main-screen" class="main-content hidden">
  <!-- Install banner (shown when installable) -->
  <div id="install-banner" class="install-banner hidden">
    <div>📲</div>
    <div class="info">
      <strong>加入主畫面</strong>
      <span>安裝成 App，離線也能用</span>
    </div>
    <button id="install-btn">安裝</button>
  </div>

  <!-- Upload zone -->
  <div id="upload-section">
    <div class="upload-zone" id="upload-zone">
      <input type="file" id="file-input" accept="image/*" capture="environment" />
      <div class="icon-wrap">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
          <circle cx="12" cy="13" r="4"/>
        </svg>
      </div>
      <div class="label">拍照 或 選取圖片</div>
      <div class="sub">對準帳單條碼或轉帳號碼</div>
      <div class="types">
        <span>條碼</span>
        <span>帳號</span>
        <span>繳費編號</span>
        <span>轉帳代碼</span>
      </div>
    </div>
  </div>

  <!-- Preview -->
  <div id="preview-section" class="hidden">
    <div class="preview-card">
      <img id="preview-img" src="" alt="帳單預覽" />
      <div class="overlay">
        <button class="retake-btn" id="retake-btn">
          <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="14" height="14">
            <polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-4"/>
          </svg>
          重新拍攝
        </button>
      </div>
    </div>
    <button class="scan-btn" id="scan-btn" style="margin-top:12px;">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/>
      </svg>
      AI 辨識數字
    </button>
  </div>

  <!-- Loading -->
  <div id="loading-section" class="loading-state hidden">
    <div class="loading-ring"></div>
    <p>AI 正在辨識圖片中的數字<span class="dots"></span></p>
  </div>

  <!-- Result -->
  <div id="result-section" class="result-section hidden"></div>

  <!-- Error -->
  <div id="error-section" class="hidden"></div>

  <!-- Settings row -->
  <div class="settings-row" style="margin-top: auto; padding-top: 8px;">
    <button class="settings-link" id="change-key-btn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="3"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/>
        <path d="M4.93 4.93a10 10 0 0 0 0 14.14"/>
      </svg>
      更換 API Key
    </button>
    <span style="font-size:11px; color:var(--text3);">轉帳前請再次核對</span>
  </div>
</div>

<script>
// ── State ──
let apiKey = localStorage.getItem('gemini_api_key') || '';
let currentImageData = null;
let deferredInstallPrompt = null;

// ── Elements ──
const setupScreen = document.getElementById('setup-screen');
const mainScreen = document.getElementById('main-screen');
const apiKeyInput = document.getElementById('api-key-input');
const saveKeyBtn = document.getElementById('save-key-btn');
const changeKeyBtn = document.getElementById('change-key-btn');
const fileInput = document.getElementById('file-input');
const uploadSection = document.getElementById('upload-section');
const previewSection = document.getElementById('preview-section');
const previewImg = document.getElementById('preview-img');
const retakeBtn = document.getElementById('retake-btn');
const scanBtn = document.getElementById('scan-btn');
const loadingSection = document.getElementById('loading-section');
const resultSection = document.getElementById('result-section');
const errorSection = document.getElementById('error-section');
const installBanner = document.getElementById('install-banner');
const installBtn = document.getElementById('install-btn');

// ── Init ──
function init() {
  if (apiKey) {
    showMain();
  } else {
    showSetup();
  }
}

function showSetup() {
  setupScreen.classList.remove('hidden');
  mainScreen.classList.add('hidden');
}

function showMain() {
  setupScreen.classList.add('hidden');
  mainScreen.classList.remove('hidden');
}

// ── API Key ──
saveKeyBtn.addEventListener('click', () => {
  const val = apiKeyInput.value.trim();
  if (!val.startsWith('AIza') || val.length < 30) {
    apiKeyInput.style.borderColor = 'var(--danger)';
    apiKeyInput.placeholder = '格式不正確，請確認 Key 以 AIza 開頭';
    return;
  }
  apiKey = val;
  localStorage.setItem('gemini_api_key', apiKey);
  showMain();
});

changeKeyBtn.addEventListener('click', () => {
  apiKeyInput.value = apiKey;
  showSetup();
});

// ── File input ──
fileInput.addEventListener('change', (e) => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (ev) => {
    currentImageData = ev.target.result;
    previewImg.src = currentImageData;
    uploadSection.classList.add('hidden');
    previewSection.classList.remove('hidden');
    resultSection.classList.add('hidden');
    errorSection.classList.add('hidden');
    resultSection.innerHTML = '';
  };
  reader.readAsDataURL(file);
});

retakeBtn.addEventListener('click', () => {
  currentImageData = null;
  fileInput.value = '';
  uploadSection.classList.remove('hidden');
  previewSection.classList.add('hidden');
  resultSection.classList.add('hidden');
  errorSection.classList.add('hidden');
});

// ── Scan ──
scanBtn.addEventListener('click', async () => {
  if (!currentImageData) return;
  previewSection.classList.add('hidden');
  loadingSection.classList.remove('hidden');
  resultSection.classList.add('hidden');
  errorSection.classList.add('hidden');

  try {
    const base64Data = currentImageData.split(',')[1];
    const mediaType = currentImageData.split(';')[0].split(':')[1];

    const prompt = `這是一張帳單或繳費通知的圖片。請辨識圖片中所有用於轉帳或繳費的數字，包括：帳號、條碼數字、繳費編號、轉帳代碼等。

請用 JSON 格式回覆，只回傳 JSON，不要有其他文字：
{
  "numbers": [
    { "label": "欄位名稱（例如：帳號、繳費編號）", "value": "純數字字串，不含空格或符號" }
  ],
  "full_string": "所有數字連在一起的完整字串",
  "note": "補充說明（如果有需要，否則設為空字串）"
}

如果找不到任何數字，請回傳 { "numbers": [], "full_string": "", "note": "圖片中找不到可辨識的轉帳數字" }`;

    const response = await fetch(
      `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`,
      {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          contents: [{
            parts: [
              { inline_data: { mime_type: mediaType, data: base64Data } },
              { text: prompt }
            ]
          }],
          generationConfig: { maxOutputTokens: 1000 }
        })
      }
    );

    const data = await response.json();
    loadingSection.classList.add('hidden');
    previewSection.classList.remove('hidden');

    if (!response.ok) {
      const msg = data.error?.message || '辨識失敗，請稍後再試';
      throw new Error(msg);
    }

    const text = data.candidates?.[0]?.content?.parts?.map(p => p.text || '').join('') || '';
    let parsed;
    try {
      const clean = text.replace(/```json|```/g, '').trim();
      parsed = JSON.parse(clean);
    } catch {
      throw new Error('無法解析辨識結果，請重試');
    }

    if (!parsed.numbers || parsed.numbers.length === 0) {
      throw new Error(parsed.note || '圖片中找不到可辨識的數字，請確認圖片清晰並重試');
    }

    renderResult(parsed);
  } catch (err) {
    loadingSection.classList.add('hidden');
    previewSection.classList.remove('hidden');
    errorSection.classList.remove('hidden');
    errorSection.innerHTML = `
      <div class="error-box">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
        </svg>
        <span>${err.message}</span>
      </div>`;
  }
});

// ── Render result ──
function renderResult(parsed) {
  resultSection.classList.remove('hidden');

  const successHeader = `
    <div class="result-header">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="20 6 9 17 4 12"/>
      </svg>
      辨識完成
    </div>`;

  const numberCards = parsed.numbers.map(n => `
    <div class="number-card">
      <div class="card-head">${n.label}</div>
      <div class="card-body">
        <div class="number-display">${formatNum(n.value)}</div>
        <button class="copy-btn" onclick="copyVal('${n.value}', this)" title="複製">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/>
            <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
          </svg>
        </button>
      </div>
    </div>`).join('');

  let fullCard = '';
  if (parsed.numbers.length > 1 && parsed.full_string) {
    fullCard = `
      <div class="full-string-card">
        <div class="card-head">完整串接數字（直接貼上轉帳）</div>
        <div class="card-body">
          <div class="number-display">${parsed.full_string}</div>
          <button class="copy-btn" onclick="copyVal('${parsed.full_string}', this)" title="複製完整數字">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/>
              <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
            </svg>
          </button>
        </div>
      </div>`;
  }

  let noteBox = parsed.note ? `<div class="note-box">💡 ${parsed.note}</div>` : '';

  resultSection.innerHTML = successHeader + numberCards + fullCard + noteBox;
}

function formatNum(str) {
  return str.replace(/(.{4})/g, '$1 ').trim();
}

function copyVal(text, btn) {
  navigator.clipboard.writeText(text).then(() => {
    showCopied(btn);
  }).catch(() => {
    const ta = document.createElement('textarea');
    ta.value = text;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    showCopied(btn);
  });
}

function showCopied(btn) {
  const orig = btn.innerHTML;
  btn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>`;
  btn.classList.add('copied');
  setTimeout(() => {
    btn.innerHTML = orig;
    btn.classList.remove('copied');
  }, 2000);
}

// ── PWA Install ──
window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  deferredInstallPrompt = e;
  installBanner.classList.remove('hidden');
});

installBtn.addEventListener('click', async () => {
  if (!deferredInstallPrompt) return;
  deferredInstallPrompt.prompt();
  const { outcome } = await deferredInstallPrompt.userChoice;
  if (outcome === 'accepted') installBanner.classList.add('hidden');
  deferredInstallPrompt = null;
});

window.addEventListener('appinstalled', () => {
  installBanner.classList.add('hidden');
});

// ── Service Worker ──
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(console.error);
}

init();
</script>
